services:
  winzcart-db:
    image: postgres:15-alpine
    container_name: winzcart-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: Winzcart
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - winzcart-network

  winzcart-api:
    image: winzcart-api
    build:
      context: .
      dockerfile: Dockerfile
    container_name: winzcart-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=winzcart-db;Port=5432;Database=Winzcart;Username=postgres;Password=postgres
      - JwtSettings__SecretKey=super_secret_key_that_is_at_least_32_characters_long_for_hmacsha256_winzcart!
      - JwtSettings__Issuer=winzcart-api
      - JwtSettings__Audience=winzcart-clients
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      - winzcart-db
    networks:
      - winzcart-network

networks:
  winzcart-network:
    driver: bridge

volumes:
  postgres_data:
